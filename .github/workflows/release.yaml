name: Create Release and Publish Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image-paths:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.paths.outputs.rebuild }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker context changes
        id: paths
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" | grep -qE '^server/|^docker-entrypoint\.sh$'; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.semver.outputs.next }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # semver-action's fallbackTag must already exist as a remote tag. When the repo has
      # no semver tags yet, create v0.0.0 at the initial commit so the action has a baseline.
      - name: Bootstrap initial semver tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin --tags --force
          if git ls-remote --tags origin \
            | awk '{print $2}' \
            | sed 's|refs/tags/||' \
            | sed 's/\^{}//' \
            | sort -u \
            | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Semver tag already present on origin"
            exit 0
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          ROOT=$(git rev-list --max-parents=0 HEAD | tail -n1)
          git tag v0.0.0 "$ROOT"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin v0.0.0 || true
          git fetch origin --tags --force

      - name: Get next version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: ${{ github.ref_name }}
          patchAll: true
          majorList: BREAKING
          noVersionBumpBehavior: patch

      - name: Create or update GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          prerelease: false
          draft: false
          makeLatest: true
          commit: ${{ github.sha }}
          tag: ${{ steps.semver.outputs.next }}
          name: ${{ steps.semver.outputs.next }}
          generateReleaseNotes: true
          token: ${{ github.token }}

  build-neoforge-image:
    uses: ./.github/workflows/image-build.yaml
    needs: [tag-release, image-paths]
    if: github.event_name == 'workflow_dispatch' || needs.image-paths.outputs.rebuild == 'true'
    secrets: inherit
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    with:
      imageName: neoforge
      dockerfile: Dockerfile
      tagOverride: ${{ needs.tag-release.outputs.tag }}
