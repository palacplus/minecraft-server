# GitHub Actions publishes ghcr.io/<owner>/<repo>-neoforge:<release-tag> (see .github/workflows).
image:
  repository: ghcr.io/palacplus/minecraft-server-neoforge
  tag: 0.0.9
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

minecraft:
  servicePort: 25565
  jvm:
    # Passed to user_jvm_args.txt on each start (overrides pack defaults when chart-managed file is mounted).
    memory: 4G
    extraArgs: []
  # Extra lines appended to user_jvm_args.txt (e.g. Aikar flags as separate list items).
  jvmExtraLines: []

resources:
  requests:
    cpu: "1"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 10Gi

# World, player data, logs, and any files written under /data live on this volume.
# Leave enabled: true for production; disabling uses emptyDir and data is lost when the pod is removed (existingClaim is then ignored).
#
# volumeSubPath: subdirectory on the PVC filesystem that is mounted at /data in the container (so the PV holds
# e.g. minecraft/world/...). Set to "" to mount the PVC root at /data (older layouts).
# If you previously used an initContainer that ran as root on NFS, remove that subdirectory on the volume once so it
# can be recreated with correct ownership (otherwise you may see Permission denied under /data).
#
# This chart never creates PVCs. When persistence.enabled is true, set existingClaim to a PVC that already
# exists in the release namespace. Use replicaCount: 1 with typical RWO volumes.
persistence:
  enabled: true
  existingClaim: plex-pvc
  volumeSubPath: minecraft
  subPathInitImage: busybox:1.36

service:
  type: NodePort
  annotations: {}
  nodePort: 30565
  # loadBalancerIP: ""
  # externalTrafficPolicy: ""

externalDNS:
  enabled: true
  # FQDN players will use, e.g. mc.example.com.
  hostname: minecraft.palacpl.us
  ttl: 60
  # Set for providers that support proxy mode, e.g. Cloudflare ("true"/"false").
  proxied: "false"

nodeSelector: {}
tolerations: []
affinity: {}

updateStrategy:
  type: RollingUpdate

terminationGracePeriodSeconds: 60

livenessProbe:
  enabled: true
  initialDelaySeconds: 300
  periodSeconds: 300
  failureThreshold: 5
  timeoutSeconds: 5

readinessProbe:
  enabled: true
  initialDelaySeconds: 300
  periodSeconds: 10
  failureThreshold: 12
  timeoutSeconds: 5

extraEnv: []
extraVolumeMounts: []
extraVolumes: []
