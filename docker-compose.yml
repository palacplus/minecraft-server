services:
  minecraft:
    build: .
    image: minecraft-server:local
    ports:
      - "25565:25565"
    volumes:
      - minecraft_data:/data
      - ./helm/minecraft/files/server.properties:/etc/minecraft/server.properties:ro
    stdin_open: true
    tty: true
    stop_grace_period: 60s

volumes:
  minecraft_data:
